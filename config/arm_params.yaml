arm_controller:
  ros__parameters:
    # Target joint positions in radians (joint_1 .. joint_6).
    # The arm oscillates between the home pose (all zeros) and these targets.
    joint_targets: [1.57, -0.78, 1.0, 0.0, 0.5, -0.3]
    # Max joint velocity (rad/s)
    max_velocity: 1.5
    # Joint acceleration (rad/s^2)
    acceleration: 2.0
    # Control loop / publish frequency (Hz)
    publish_rate: 50.0
    # Gripper opening in meters: 0.0 = closed, 0.02 = fully open (URDF limit)
    gripper_target: 0.0
    # Seconds to pause at each end of the oscillation before reversing
    dwell_time: 1.0
